spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  sql:
    init:
      mode: never

app:
  security:
    jwt:
      secret: test-secret-test-secret-test-secret-test-secret-32bytes-min
      expiration-minutes: 60
      issuer: desafio-hyperativa-test
  card:
    pepper: test-pepper

server:
  ssl:
    enabled: false
  port: 8080

logging:
  level:
    com.hyperativa.desafio: DEBUG
