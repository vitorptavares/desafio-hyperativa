spring:
  application:
    name: desafio-hyperativa
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/hyperativa?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${DB_USER:hyperativa}
    password: ${DB_PASSWORD:hyperativa}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        type:
          preferred_uuid_jdbc_type: CHAR
        jdbc:
          batch_size: 500
        order_inserts: true
        order_updates: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 25MB
      max-request-size: 25MB

server:
  port: ${SERVER_PORT:8443}
  ssl:
    enabled: ${SSL_ENABLED:true}
    key-store: classpath:keystore.p12
    key-store-password: ${SSL_KEYSTORE_PASSWORD:hyperativa123}
    key-store-type: PKCS12
    key-alias: hyperativa
  http2:
    enabled: true
  error:
    include-message: always
    include-binding-errors: always

app:
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-please-this-is-a-very-long-default-secret-only-for-dev-32bytes-min}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
      issuer: desafio-hyperativa
  card:
    pepper: ${CARD_HASH_PEPPER:dev-only-pepper-replace-in-production}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    root: INFO
    com.hyperativa.desafio: DEBUG
    org.hibernate.SQL: WARN
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
